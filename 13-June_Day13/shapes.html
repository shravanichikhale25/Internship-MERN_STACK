<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes</title>
    <style>
        body{
            background-color: #eee;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding: 30px;
            font-family: Arial;
        }
        .shape{
            color: white;
            text-align: center;
            font-size: 25px;
            font-weight: bold;
            line-height: 200px;
        }
        .leaf{
            width: 180px;
            height: 180px;
            background: deepskyblue;
            border-radius: 0 100% 0 100%;
        }

        .halfoval{
            width: 300px;
            height: 150px;
            background: blue;
            border-radius: 0 0 150px 150px;
        }

        .oval{
            width: 300px;
            height: 180px;
            background: orange;
            border-radius: 50%;
        }

        .twist{
            width: 300px;
            height: 150px;
            background: green;
            border-radius: 0 100%;
            transform: skewX(20deg);
        }
        .twist2{
            width: 350px;
            height: 180px;
            background: purple;
            border-radius: 0 50% 0 50%;
        }
        .circle{
            width: 180px;
            height: 180px;
            background: magenta;
            border-radius: 50%;
        }
        .tab{
            width: 190px;
            height: 190px;
            background: deepskyblue;
            border-radius: 0 0 50% 50%;
        }
        .three{
            width: 190px;
            height: 190px;
            background: blue;
            border-radius: 0 50% 50% 50%;
        }
    </style>
</head>
<body>
    <div class="shape leaf">Leaf</div>
    <div class="shape halfoval">Half Oval</div>
    <div class="shape oval">Oval</div>
    <div class="shape twist">Twist</div>
    <div class="shape twist2">Twist two</div>
    <div class="shape circle">Circle</div>
    <div class="shape tab">Tab</div>
    <div class="shape three">Three Sided</div>
</body>
</html>
