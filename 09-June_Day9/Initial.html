<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pattern Output</title>
  </head>
  <body>
    
      <h2>Pattern Initial A</h2>

      <script>
        const n = 5;
        document.write('<pre>');

        for (let i = 0; i < n; i++) {
          let str = '';
          for (let j = 0; j < 2 * n - 1; j++) {
            if (
              j == n - 1 - i ||
              j == n - 1 + i ||
              (i == 2 && j > n - 1 - i && j < n - 1 + i)
            ) {
              str += '*';
            } else {
              str += ' ';
            }
          }
          document.write(str + '\n');
        }

        document.write('</pre>');
      </script>
  </body>
</html>
