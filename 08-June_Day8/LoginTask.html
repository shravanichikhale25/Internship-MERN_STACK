<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>LOGIN FORM</h1>
    <input type="text" name="" id="user" placeholder="Enter Your Username:">
    <br> <br>
    <input type="password" name="" id="pass" placeholder="Enter  Your Passsword:">
    <button onclick="login()">Login</button>
    <h1 id="msg"></h1>
    <script>
         let chance = 3;
        function login()  {
            let username="admin"
            let password="admin@123"
            var msg=document.getElementById("msg")
            var user=document.getElementById("user")
            var pass=document.getElementById("pass")
            if(username===user.value && password===pass.value){

                msg.innerHTML="Login Successful !!!<br>Hello " +user.value;
            }
            else{
                chance--;
                alert("Login Failed.Chances left: " + chance);
                if(chance <= 0){
                    msg.innerHTML="Your account has been freezed for few minutes. Please try again ...";
                }
            }
               
        }
    </script>

</body>
</html>
