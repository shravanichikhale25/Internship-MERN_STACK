<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Greeting</title>
  </head>
  <body>
    <h1>Employee Greeting</h1>

    <label for="employeeId">Employee ID:</label>
    <input type="text" id="employeeId" placeholder="Enter Employee ID" />
    <br /><br />

    <label for="employeeName">Employee Name:</label>
    <input type="text" id="employeeName" placeholder="Enter Employee Name" />
    <br /><br />

    <label for="hourSelect">Time:</label>
    <select id="hourSelect">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
    </select>

    <select id="periodSelect">
      <option value="AM">AM</option>
      <option value="PM">PM</option>
    </select>

    <br /><br />
    <button type="button" onclick="showGreeting()">Show Greeting</button>

    <script>
      function showGreeting() {
        var employeeId = document.getElementById("employeeId").value;
        var employeeName = document.getElementById("employeeName").value;
        var hour = parseInt(document.getElementById("hourSelect").value, 10);
        var period = document.getElementById("periodSelect").value;
        var timeLabel = hour + " " + period;
        var hour24 = hour;
        var greeting = "";

        if (period === "PM" && hour !== 12) {
          hour24 = hour + 12;
        }

        if (period === "AM" && hour === 12) {
          hour24 = 0;
        }

        if (hour24 >= 0 && hour24 <= 11) {
          greeting = "Good Morning";
        } else if (hour24 <= 16) {
          greeting = "Good Afternoon";
        } else if (hour24 <= 19) {
          greeting = "Good Evening";
        } else {
          greeting = "Good Night";
        }

        document.write("<h1>" + greeting + ", " + employeeName + "</h1>");
        document.write(
          "<p><strong>Employee ID:</strong> " + employeeId + "</p>",
        );
        document.write(
          "<p><strong>Employee Name:</strong> " + employeeName + "</p>",
        );
        document.write("<p><strong>Time In:</strong> " + timeLabel + "</p>");
      }
    </script>
  </body>
</html>
