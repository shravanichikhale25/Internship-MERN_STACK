<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Logo</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .logo{
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg,#feda75,#d52976,#4f5bd5);
            border-radius: 30px;
            position: relative;
        }

        .logo::before{
            content: "";
            position: absolute;
            width: 50px;
            height: 50px;
            border: 8px solid white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }

        .logo::after{
            content: "";
            background: white;
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            top: 35px;
            right: 35px;
        }

        .inner-square{
            position: absolute;
            width: 100px;
            border: 8px solid white;
            height: 100px;
            border-radius: 25px;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="inner-square"></div>
    </div>
</body>
</html>
