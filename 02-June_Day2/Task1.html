    <script>
        var a = Number(prompt("Enter 1st number"))
        var b = Number(prompt("Enter 2nd number"))

        console.log("a=",a);
        console.log("b=",b);
        

        console.log("Add = ",a+b);

        console.log("Div = ",a/b); 
    </script>
