<!--  Write a program to check wheather a character is vowel or consonent -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Write a program to check wheather a character is vowel or consonent</h1>
    <script>
        let ch = prompt("Enter a character:");

    if (ch === 'a' || ch === 'e' || ch === 'i' || ch === 'o' || ch === 'u') {
        document.write(ch + " is a Vowel");
    } else {
        document.write(ch + " is a Consonant");
    }

    </script>
</body>
</html>
