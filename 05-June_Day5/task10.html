<!--  Write a program to calculate grades based on thier marks -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to calculate grades based on thier marks</h1>
    <script>
            let marks =Number(prompt("Enter the marks"));
        if(marks>=85){
            document.write("You have get Grade A");
        }
        else if(marks>=75){
            document.write("you have get grade B");
        }
        else if(marks>=60){
            document.write("you have get Grade C");
        }
        else if(marks>=40){
            document.write("You are pass");
        }
        else{
            document.write("You are Fail");
        }
    </script>
</body>
</html>
