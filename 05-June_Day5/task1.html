<!-- Write a program to check wheather a number is positive -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to check wheather a number is positive</h1>
    <script>
        let num =Number(prompt("Enter number"));
        
        if(num>0){
            document.write("Number is positive");
        }
        else{
            document.write("Number is negative");
        }
    </script>
</body>
</html>
