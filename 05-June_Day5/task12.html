<!-- Write a program to classify the age group -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to classify the age group</h1>
    <script>
        let age =Number(prompt("Enter number"));
        
        if(age>=60){
            document.write("Senior age");
        }
        else if(age>=20){
            document.write("Adult age")
        }
        else if(age>=13){
            document.write("Teen age")
        }
        else if(age<13){
            document.write("Child age");
        }
    </script>
</body>
</html>
