<!-- Write a program to print month name using (1-12) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to print month name using (1-12)</h1>
    <script>
        let ch=Number(prompt("Enter your choice"));
        switch (ch) {
            case 1:document.write("Monday");
                break;
            
            case 2:document.write("Tuesday");
            break;

            case 3:document.write("Wednesday");
            break;

            case 4:document.write("Thursday");
            break;
        
            case 5:document.write("Friday");
            break;

            case 6:document.write("Saturday");
            break;

            case 7:document.write("Sunday");
            break;

            case 8:document.write("Monday");
                break;
            
            case 9:document.write("Tuesday");
            break;

            case 10:document.write("Wednesday");
            break;

            case 11:document.write("Thursday");
            break;
        
            case 12:document.write("Friday");
            break;

            default:document.write("please enter valid choice");
        }
    </script>
</body>
</html>
