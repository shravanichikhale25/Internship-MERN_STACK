<!--  Write a program to print "pass" if marks are greater than 40 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to print "pass" if marks are greater than 40</h1>
    <script>
            let marks =Number(prompt("Enter the marks"));
        if(marks>40){
            document.write("You are  Pass");
        }
        else{
            document.write("You are Fail");
        }
    </script>
</body>
</html>
