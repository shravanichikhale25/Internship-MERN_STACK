<!-- Write a program to check wheather a number is positive,negative,or zero -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to check wheather a number is Positive,Negative or Zero</h1>
    <script>
        let num =Number(prompt("Enter number"));
        
        if(num>0){
            document.write(num+": Number is positive");
        }
        else if(num<0){
            document.write(num+": Number is Negative")
        }
        else{
            document.write(num+": Number is Zero ");
        }
    </script>
</body>
</html>
