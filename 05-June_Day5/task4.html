<!--  Write a program to check wheather a perosn is eligible to vote -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to check wheather a perosn is eligible to vote</h1>
    <script>
            let age =Number(prompt("Enter the age"));
        if(age>=18){
            document.write("You are  eligible for vote");
        }
        else{
            document.write("You are not eligible for vote");
        }
    </script>
</body>
</html>
