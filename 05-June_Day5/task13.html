<body>
    <h1>write a program to check login credentials</h1>
    <script>
        
        var user=String(prompt("Enter username"));
        var pass=String(prompt("Enter password"));
        if(user=="sam"){
            if(pass=="sam@123"){
                console.log("Login Sucessfull");
            }
            else{
                console.log("wrong password");
                
            }
        }
        else{
            console.log("User not found");
            
        }

    
    </script>
</body>
</html>
