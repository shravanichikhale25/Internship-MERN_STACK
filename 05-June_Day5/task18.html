<!-- write a program to display menu of food items -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Write a program to display menu of food items</h1>
    <script>
        let ch=Number(prompt("Enter your choice:\n1.panner\n2.chicken\n3.Fish\n4.Chicken Biryani\n5.mutton Biryani\n6.Kaju Karri\n7.Shev Bhajii"));

        switch (ch) {
            case 1:document.write("You selected Panner dish");
                break;
            
            case 2:document.write("You selected Chicken dish");
            break;

            case 3:document.write("You selected Fish fry");
            break;

            case 4:document.write("You selected Chicken Biryani");
            break;
        
            case 5:document.write("You selected Mutton Biryani");
            break;

            case 6:document.write("You selected Kaju Karri");
            break;

            case 7:document.write("You selected Shev bhaji");
            break;

            default:document.write("please enter valid choice");
        }
    </script>
</body>
</html>
