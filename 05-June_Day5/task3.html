<!-- Write a program to check wheather a number is divisible by 5 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><h1>Write a program to check wheather a number is divisible by 5</h1>
    <script>
        let num =Number(prompt("Enter number"));
        if(num%5==0){
            document.write("Number is divisible by 5");
        }
        else{
            document.write("Number is not divisible by 5");
        }

    </script>
    
</body>
</html>
