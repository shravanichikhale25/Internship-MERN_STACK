<!--  Write a program to check wheather a year is leap year or not -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Write a program to check wheather a year is leap year or not</h1>
    <script>
        let year = Number (prompt("Enter a year:"));
    
        if(year%4==0){
            document.write(year+ " is leap year");
        }
        else{
            document.write(year+ " is not leap year");
        }


    </script>
</body>
</html>
