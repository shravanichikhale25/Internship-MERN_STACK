<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>write a program to check wheather a number is positive or even</h1>
    <script>
        let num=prompt("Enter a number");
        if(num>0){
            if(num%2==0){
                document.write(num+" : Number is Positive and Even")
            }
            else{
                document.write(num+" : Number is postive but odd")
            }
        }
        
        else{
            document.write(num+ " Number is not positive")
        }
    </script>
</body>
</html>
