<!-- write a program to check a vowel using switch case -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>write a program to check a vowel using switch</h1>
    <script>
        let ch=prompt("Enter a character");
        switch(ch){
                case 'a':
                case 'e':
                case 'i':
                case 'o':
                case 'u':

        document.write(ch+" is vowel");
        break;

        default:document.write(ch+" is consonent")

        }
    </script>
    
</body>
</html>
