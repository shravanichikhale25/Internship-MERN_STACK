<!--  Write a program to find largest of three numbers -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Write a program to find largest of three numbers</h1>
    <script>
        var num1=Number(prompt("Enter first number"))
        var num2=Number(prompt("Enter second number"))
        var num3=Number(prompt("Enter third number"))

        if(num1>num2&&num1>num3){
            document.write( num1+" is greatest number");
            
        }
        else if(num2>num1&&num2>num3){
            document.write(num2+" is greatest number");
            
        }
        else{
            document.write(num3+" is greatest number");
            
        }
    </script>
</body>
</html>
