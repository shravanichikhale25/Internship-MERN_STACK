<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>grid layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f5abab;
      }

      .container {
        width: 535px;
        height: 400px;
        background: white;
        border: 8px solid white;
        display: grid;
        grid-template-columns: 108px 6px 110px 6px 50px 4px 2px 4px 100px 6px 124px;
        grid-template-rows: 84px 6px 100px 6px 54px 6px 130px;
        justify-content: start;
        align-content: start;
      }

      .box {
        background: red;
        color: #000;
        font: 12px Arial;
        padding: 3px;
        justify-self: start;
        align-self: start;
      }

      /* Left side box */
      .box1 {
        width: 108px;
        height: 190px;
        grid-column: 1 / 2;
        grid-row: 1 / 4;
      }

      .box7 {
        width: 108px;
        height: 190px;
        grid-column: 1 / 2;
        grid-row: 5 / 8;
      }

      /* Top side box */
      .box2 {
        width: 166px;
        height: 84px;
        grid-column: 3 / 6;
        grid-row: 1 / 2;
      }

      .box3 {
        width: 234px;
        height: 84px;
        grid-column: 8 / 12;
        grid-row: 1 / 2;
      }

      /* Middle side box */
      .box4 {
        width: 110px;
        height: 160px;
        grid-column: 3 / 4;
        grid-row: 3 / 6;
      }

      .box5 {
        width: 160px;
        height: 160px;
        grid-column: 5 / 10;
        grid-row: 3 / 6;
      }

      .box6 {
        width: 124px;
        height: 296px;
        grid-column: 11 / 12;
        grid-row: 3 / 8;
      }

      /* Bottom side box */
      .box9 {
        width: 170px;
        height: 130px;
        grid-column: 3 / 7;
        grid-row: 7 / 8;
      }

      .box8 {
        width: 100px;
        height: 130px;
        grid-column: 9 / 10;
        grid-row: 7 / 8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box box1">box1</div>
      <div class="box box2">box2</div>
      <div class="box box3">box3</div>
      <div class="box box4">box4</div>
      <div class="box box5">box5</div>
      <div class="box box6">box6</div>
      <div class="box box7">box7</div>
      <div class="box box9">box9</div>
      <div class="box box8">box8</div>
    </div>
  </body>
</html>
