<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Lite</title>
</head>
<body>
    <h1>Amazon Lite</h1>
    <label for="">Enter Product Price</label>
    <input type="number" name="" id="price">
    <br><br>
    <label for="">Enter Product Qauntity</label>
    <input type="number" id="qn">
    <br><br>
    <button onclick="getBill()">Calculate Bill</button>
    <br><br>
    <button onclick="getDiscount(0.1)">Apply 10% Discount</button>
    <button onclick="getDiscount(0.2)">Apply 20% Discount</button>
    <button onclick="getDiscount(0.3)">Apply 30% Discount</button>
    <h2 id="result"></h2>

    <script>
        var price = document.getElementById("price")
        var qn = document.getElementById("qn")
        var result = document.getElementById("result")
        let total = 0
        function getBill(discount = 0){
            var total = Number(price.value) * Number(qn.value)

            if(total>=1000){
                var finalbill = total - (total * discount)
                result.innerHTML = "Original Bill: " + total + "<br>Discounted Bill: " + finalbill;
            }else{
                result.innerHTML = "Discount available only for bills of 1000 or more.So add items worth " + (1000 - total)+" to your cart";
            }
        }

        function getDiscount(discount){
            getBill(discount)
        }
    </script>
</body>
</html>
