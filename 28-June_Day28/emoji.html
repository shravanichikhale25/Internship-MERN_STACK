<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: white;
      }

      .emoji {
        width: 200px;
        height: 200px;
        background-color: yellow;
        border-radius: 50%;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 4px solid #000;
        cursor: pointer;
        transition: background-color 0.4s ease;
      }

      .emoji.toggle-red {
        background-color: #FFB300;
    
      }

      .eye {
        width: 30px;
        height: 30px;
        background:black;
        border-radius: 50%;
        margin: 0 20px;
        transition: transform 0.3s ease-in-out;
      }

      .eye:hover
      {
        transform: scale(1.6);
      }

      .mouth {
        width: 70px;
        height: 35px;
        background: black;
        border-radius: 0 0 50px 50px;
        position: absolute;
        bottom: 35px;
        transition: all 0.4s ;
      }

      .mouth:hover {
        width: 90px;
        height: 55px;

      }
    </style>
  </head>
  <body>
    <div class="emoji" id="emojiFace">
      <div class="eye"></div>
      <div class="eye"></div>
      <div class="mouth"></div>
    </div>

    <script>
      let emoji = document.getElementById("emojiFace");
      emoji.addEventListener("dblclick", (e) => {
        e.currentTarget.classList.toggle("toggle-red");
      });
    </script>
  </body>
</html>
