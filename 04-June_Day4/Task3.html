<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple ATM</title>
</head>
<body>
    <script>
        var ch = Number(prompt("------Menu-----\n1.Check Balance\n2.Withdraw\n3.Deposit\n4.Exit"))
        var balance = 10000;

        switch(ch){
            case 1:
                document.write("Your balance is ₹",balance)
                break;
            case 2:
                var withdraw = Number(prompt("Enter amount to withdraw"))
                document.write("<h1>"+"₹"+withdraw +" withdrawn successfully"+"</h1>")
                balance=balance-withdraw;
                document.write("<h1>"+"Avaiable balance:₹"+balance+"</h1>")
                break;
            case 3:
                var deposit = Number(prompt("<h1>"+"Enter amount to diposit"+"</h1>"))
                document.write("<h1>"+"₹"+deposit +" deposit successfully"+"</h1>")
                balance=balance+deposit;
                document.write("<h1>"+"Avaiable balance:₹"+balance+"</h1>")
                break;
            case 4:
                document.write("<h1>"+"Thank you for choosing us!"+"</h1>")
                break;
            default:
                document.write("<h1>"+"Invalid choice"+"</h1>")
        }
    </script>
</body>
</html>
