<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Flower</title> 
    <style> 
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #ebabf3; 
            overflow: hidden; 
        } 
        .canvas { 
            width: 500px; 
            height: 500px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transform: rotate(45deg); 
        } 
        .squares { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 91%; 
            height: 91%; 
            border: 3px solid black;  
            border-radius: 12px;        
            box-sizing: border-box; 
            animation: spin 90s linear infinite; 
        } 
        @keyframes spin { 
            to { transform: rotate(300deg); } 
        } 
    </style> 
</head> 
<body> 
    <div class="canvas" id="canvas"></div> 
     
    <script>
       let ele = document.getElementById('canvas');
       ele.innerHTML = '<div>'
        .repeat(30).replace(/<div>/g, '<div class="squares">') + '</div>'.repeat(30)
    </script>
</body> 
</html>
